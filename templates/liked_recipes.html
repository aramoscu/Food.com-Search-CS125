<!DOCTYPE html>
<html>
<head>
    <title>Liked Recipes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='liked_recipes.css') }}">
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Go Back</a>
        <h1> Your Liked Recipes </h1>
        <div class="recipe-grid">
            {% if recipes %}
                {% for recipe in recipes %}
                <a href="/recipe/{{ recipe[0] }}" class="recipe-link">
                    <div class="recipe-card">
                        <h3>{{ recipe[1] }} ({{ recipe[7] }}⭐ {{ recipe[8] }} Reviews)</h3>
                        <p class="stats">
                            {{ recipe[2] }} mins | {{ recipe[3] }}g Protein | {{ recipe[4] }} Calories
                        </p>
                    </div>
                </a>
                {% endfor %}
            {% else %}
                <p class="empty-msg">You haven't liked any recipes yet!</p>
            {% endif %}
        </div>
    </div>
    <script>
        window.addEventListener("pageshow", function (event) {
            var historyTraversal = event.persisted || 
                                   (typeof window.performance != "undefined" && 
                                    window.performance.navigation.type === 2);
            if (historyTraversal) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
